name: Create PR develop -> master after merge

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  create-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or reuse PR from develop to master
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const head = 'develop';
            const base = 'master';

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${head}`,
              base,
              state: 'open',
            });

            if (existing.data.length > 0) {
              core.info(`Found existing PR #${existing.data[0].number} from ${head} to ${base}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head,
              base,
              title: `Release: ${head} → ${base}`,
              body: `Automated PR from \`${head}\` into \`${base}\` after merge into \`${head}\`.`,
              draft: false,
            });
            core.info(`Created PR #${pr.data.number}`);
